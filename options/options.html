<!DOCTYPE html>
<html lang="zh-CN" style="display:none">
<head>
  <script src="theme-init.js"></script>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Virus Detector 设置</title>
  <link rel="stylesheet" href="options.css">
</head>
<body>
  <div id="app">
    <!-- ====== SIDEBAR ====== -->
    <aside id="sidebar">
      <div class="sidebar-header">
        <svg xmlns="http://www.w3.org/2000/svg"
     viewBox="0 0 128 128"
     fill="none">

    <!-- 外轮廓 -->
    <path
        d="M22 10
           H106
           A16 16 0 0 1 122 26
           V88
           L64 120
           L6 88
           V26
           A16 16 0 0 1 22 10Z"
        stroke="#4CAF50"
        stroke-width="8"
        stroke-linejoin="round"
        stroke-linecap="round"/>

    <!-- 勾 -->
    <path
        d="M47 66
           L62 81
           L86 48"
           transform="translate(0,8)"
        stroke="#4CAF50"
        stroke-width="10"
        stroke-linecap="round"
        stroke-linejoin="round"/>
    </svg>
        <div class="sidebar-title-group">
          <span class="sidebar-title">Virus Detector</span>
          <span class="sidebar-subtitle">设置</span>
        </div>
      </div>

      <nav id="sidebar-nav">
        <a class="nav-item active" data-section="general">
          <span class="nav-icon"><svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="12" cy="12" r="3"/><path d="M12 1v2M12 21v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M1 12h2M21 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42"/></svg></span>
          常规
        </a>
        <a class="nav-item" data-section="detection">
          <span class="nav-icon"><svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></svg></span>
          检测规则
        </a>
        <a class="nav-item" data-section="privacy">
          <span class="nav-icon"><svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0110 0v4"/></svg></span>
          隐私与数据
        </a>
        <a class="nav-item" data-section="whitelist">
          <span class="nav-icon"><svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/><path d="M9 11l2 2 4-4"/></svg></span>
          白名单
        </a>
        <a class="nav-item" data-section="about">
          <span class="nav-icon"><svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="12" cy="12" r="10"/><line x1="12" y1="16" x2="12" y2="12"/><line x1="12" y1="8" x2="12.01" y2="8"/></svg></span>
          关于
        </a>
        <a class="nav-item" data-section="thresholds" data-mode="advanced">
          <span class="nav-icon"><svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><line x1="4" y1="20" x2="20" y2="20"/><polyline points="6 20 6 14 10 8 14 14 18 6 18 20"/></svg></span>
          评分阈值
        </a>
        <a class="nav-item" data-section="download" data-mode="advanced">
          <span class="nav-icon"><svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg></span>
          下载检测
        </a>
        <a class="nav-item" data-section="blacklist" data-mode="advanced">
          <span class="nav-icon"><svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="12" cy="12" r="10"/><line x1="15" y1="9" x2="9" y2="15"/><line x1="9" y1="9" x2="15" y2="15"/></svg></span>
          下载黑名单
        </a>
      </nav>

      <div class="sidebar-footer">
        <div class="mode-topic">模式</div>
        <div id="mode-toggle" class="mode-segmented">
          <button class="mode-segment active" data-mode="basic">基础</button>
          <button class="mode-segment" data-mode="advanced">高级</button>
          <button class="mode-segment" data-mode="developer">开发者</button>
        </div>
        <button id="drawer-close-btn">
          <svg viewBox="0 0 24 24" width="15" height="15" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
            <line x1="18" y1="6" x2="6" y2="18"/>
            <line x1="6" y1="6" x2="18" y2="18"/>
          </svg>
          关闭
        </button>
      </div>
    </aside>

    <!-- ====== MAIN CONTENT ====== -->
    <main id="content">
      <!-- Section container (JS populated) -->
      <div id="section-container"></div>

      <!-- Actions bar -->
      <div id="actions-bar">
        <button id="drawer-toggle-btn" class="btn" title="打开菜单">
          <svg viewBox="0 0 24 24" width="15" height="15" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
            <line x1="3" y1="6" x2="21" y2="6"/>
            <line x1="3" y1="12" x2="21" y2="12"/>
            <line x1="3" y1="18" x2="21" y2="18"/>
          </svg>
        </button>
        <button id="import-btn" class="btn" title="从 JSON 文件导入设置">
          <svg viewBox="0 0 24 24" width="15" height="15" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>
          导入设置
        </button>
        <button id="export-btn" class="btn" title="导出设置到 JSON 文件">
          <svg viewBox="0 0 24 24" width="15" height="15" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
          导出设置
        </button>
        <button id="reset-btn" class="btn btn-danger" title="恢复所有设置为默认值">
          <svg
            role="img"
            xmlns="http://www.w3.org/2000/svg"
            width="16px"
            height="16px"
            viewBox="0 0 24 24"
            aria-labelledby="refreshIconTitle"
            stroke="currentColor"
            stroke-width="2"
            stroke-linecap="square"
            stroke-linejoin="miter"
            fill="none"
          >
            <polyline points="22 12 19 15 16 12" />
            <path
              d="M11,20 C6.581722,20 3,16.418278 3,12 C3,7.581722 6.581722,4 11,4 C15.418278,4 19,7.581722 19,12 L19,14"
            />
          </svg>
          恢复默认
        </button>
        <input type="file" id="import-file" accept=".json" style="display:none">
      </div>
    </main>

    <!-- Drawer overlay -->
    <div id="drawer-overlay"></div>

    <!-- Toast container -->
    <div id="toast-container"></div>

    <!-- Confirmation modal (hidden by default) -->
    <div id="confirm-modal" class="modal-overlay" style="display:none;">
      <div class="modal-box">
        <div class="modal-icon">
          <svg viewBox="0 0 24 24" width="36" height="36" fill="none" stroke="#FF9800" stroke-width="2" stroke-linecap="round"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>
        </div>
        <p class="modal-message" id="modal-message"></p>
        <div class="modal-actions">
          <button id="modal-cancel-btn" class="btn">取消</button>
          <button id="modal-confirm-btn" class="btn btn-danger">确认</button>
        </div>
      </div>
    </div>
  </div>

  <script src="body-sync.js"></script>
  <script type="module" src="options.js"></script>
</body>
</html>
